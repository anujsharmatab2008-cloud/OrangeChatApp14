name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lzip clzip libffi-dev libssl-dev

    - name: Build with Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36 kivy
        # This initializes the environment cleanly without trying to wipe non-existent folders
        buildozer auto-accept-licenses
        buildozer -v android debug
