name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-level: '3.10'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lzip standard-clzip libffi-dev libssl-dev

    - name: Build with Buildozer (No Cache)
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36 kivy
        # Force a fresh clean wipe before packaging begins
        buildozer android clean
        buildozer -v android debug
