name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Absolute System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          sqlite3 \
          libsqlite3-dev \
          unzip \
          zip \
          lld \
          bzip2 \
          libbz2-dev \
          liblzma-dev \
          libreadline-dev \
          libncursesw5-dev \
          libgdbm-dev \
          libdb5.3-dev \
          uuid-dev \
          zlib1g-dev \
          lzip \
          clzip

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK via Buildozer
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 wheel
        pip install git+https://github.com/kivy/buildozer.git
        buildozer -v android debug
