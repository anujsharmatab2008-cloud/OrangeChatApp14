name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libxml2-dev libxslt1-dev
          pip install --user --upgrade buildozer cython virtualenv

      - name: Auto-Accept Android SDK Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Manually pre-populate licenses directory structure to stop terminal pauses
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          echo -e "247c16e502352063a9fb1f909019721523f37429\n2847c16e502352063a9fb1f909019721523f37429\nd56f17341b56242645d7a315f5c66259cf125141\n84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          ACCEPT_ANDROID_SDK_LICENSES: y
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeChatApp-APK
          path: bin/*.apk
